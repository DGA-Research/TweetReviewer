[server]
headless = true
address = "0.0.0.0"
port = 8503
# Safe to disable on a trusted network or behind a reverse proxy (e.g. Coolify/Traefik).
enableCORS = false
enableXsrfProtection = false
# Max upload size (MB) for researcher workbooks.
maxUploadSize = 200

[browser]
gatherUsageStats = false

[theme]
base = "light"
