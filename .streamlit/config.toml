[server]
headless = true
address = "0.0.0.0"
port = 8501
# Safe to disable behind the Caddy reverse proxy, which terminates TLS and
# forwards from the same Docker network.
enableCORS = false
enableXsrfProtection = false
# Max upload size (MB) for researcher workbooks.
maxUploadSize = 200

[browser]
gatherUsageStats = false

[theme]
base = "light"
